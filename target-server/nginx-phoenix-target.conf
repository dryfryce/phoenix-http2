server {
    listen 8080;
    server_name localhost;
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}

server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/phoenix-test.crt;
    ssl_certificate_key /etc/nginx/ssl/phoenix-test.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    keepalive_timeout   65;
    keepalive_requests  10000;

    access_log /var/log/nginx/access.json.log json_stream;

    location / {
        root /var/www/target;
        index index.html;
        add_header X-Protocol $server_protocol always;
        add_header X-HTTP2    $http2 always;
    }

    location /health {
        return 200 '{"status":"ok","proto":"$server_protocol","h2":"$http2"}';
        add_header Content-Type application/json;
    }

    location /dashboard {
        root /var/www/target;
        try_files /dashboard.html =404;
    }

    location ~ ^/(heavy|small)$ {
        proxy_pass http://127.0.0.1:8888;
    }

    # WebSocket proxy — browser connects wss://host/ws → ws://localhost:9001
    location /ws {
        proxy_pass         http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
