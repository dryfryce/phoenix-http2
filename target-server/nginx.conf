user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    # JSON format — each line = 1 HTTP/2 stream request (truth for analytics)
    log_format json_stream escape=json '{'
        '"ts":$msec,'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"rt":$request_time,'
        '"proto":"$server_protocol",'
        '"http2":"$http2",'
        '"conn":$connection,'
        '"conn_req":$connection_requests,'
        '"ua":"$http_user_agent"'
    '}';

    # UNBUFFERED — critical for real-time tail
    access_log /var/log/nginx/access.json.log json_stream buffer=1k flush=100ms;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
